name: Install Linux system dependencies
description: Install Ubuntu packages required by the Tauri workspace
runs:
  using: composite
  steps:
    - name: Install Linux system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf
