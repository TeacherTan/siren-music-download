name: Distribute desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-distribute:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-13
            target: x86_64-apple-darwin
          - name: macOS Apple Silicon
            runner: macos-14
            target: aarch64-apple-darwin
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build workflow artifacts
        if: github.ref_type != 'tag'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          includeDebug: false
          uploadUpdaterJson: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: '[platform]-[arch]-[bundle]'

      - name: Build and upload release assets
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: Siren Music Download ${{ github.ref_name }}
          releaseBody: Automated desktop build artifacts for macOS and Windows.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          includeDebug: false
          uploadUpdaterJson: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: '[platform]-[arch]-[bundle]'
          releaseAssetNamePattern: '[name]_[version]_[platform]_[arch][ext]'
